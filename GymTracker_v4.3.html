<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymTracker">
<meta name="theme-color" content="#0b0b12">
<title>GymTracker · Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:'Manrope',-apple-system,system-ui,sans-serif;
  font-feature-settings:"ss01","cv11";
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  letter-spacing:-0.01em}
button,input,textarea,select{font-family:inherit;color:inherit}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:"ss02","zero"}

/* ─── DESIGN TOKENS ─────────────────────────────────────────── */
:root{
  /* Surfaces */
  --bg:#0b0b12;
  --bg-grad:radial-gradient(ellipse at top,#1a0d2e 0%,#0b0b12 50%);
  --surface:#13131f;
  --surface-2:#1a1a2a;
  --surface-3:#22223a;
  --border:#262640;
  --border-soft:#1e1e30;
  --border-strong:#3a3a5e;
  /* Text */
  --text:#f0f0f5;
  --text-2:#b0b0c8;
  --text-3:#7a7a98;
  --text-dim:#4a4a68;
  /* Brand — Violet primary, Coral accent (premium pair, not generic purple) */
  --brand:#a855f7;
  --brand-2:#c084fc;
  --brand-3:#7c3aed;
  --brand-glow:rgba(168,85,247,.35);
  --accent:#ff6b6b;
  --accent-2:#ff8787;
  /* Status */
  --success:#10b981;
  --success-2:#34d399;
  --warn:#f59e0b;
  --warn-2:#fbbf24;
  --danger:#ef4444;
  --info:#06b6d4;
  --gold:#fbbf24;
  /* Radii */
  --r-sm:8px;--r:12px;--r-lg:16px;--r-xl:20px;--r-2xl:24px;
  /* Shadow */
  --sh-1:0 1px 2px rgba(0,0,0,.4);
  --sh-2:0 4px 12px rgba(0,0,0,.4);
  --sh-3:0 8px 24px rgba(0,0,0,.5);
  --sh-glow:0 0 24px rgba(168,85,247,.25);
}

body{background:var(--bg-grad) fixed}

/* ─── LAYOUT ────────────────────────────────────────────────── */
#app{max-width:480px;margin:0 auto;padding-bottom:110px;min-height:100vh;position:relative}

/* ─── HEADER ────────────────────────────────────────────────── */
#hdr{position:sticky;top:0;z-index:50;
  background:rgba(11,11,18,.85);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border-soft);
  padding:14px 18px 0}
.htop{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px}
.brand-mark{display:flex;align-items:center;gap:10px}
.brand-logo{width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--brand),var(--brand-3));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:18px;color:#fff;
  box-shadow:0 4px 12px var(--brand-glow)}
.brand-info .wlabel{font-size:9px;color:var(--text-3);letter-spacing:2.5px;font-weight:600;text-transform:uppercase}
.brand-info .wnum{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.02em}
.brand-info .wnum b{color:var(--brand-2);font-weight:800}

.hday{text-align:right}
.ppct{font-size:22px;font-weight:800;letter-spacing:-0.03em;font-family:'JetBrains Mono',monospace}
.ppct.full{color:var(--success-2)}
.ppct:not(.full){color:var(--brand-2)}
.session-time{font-size:10px;color:var(--text-3);font-family:'JetBrains Mono',monospace;margin-top:2px;display:flex;align-items:center;gap:5px;justify-content:flex-end}
.session-time .dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.pbar-wrap{height:4px;background:var(--surface-2);border-radius:99px;margin-bottom:14px;overflow:hidden;position:relative}
.pbar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(90deg,var(--brand-3),var(--brand-2),var(--accent));
  box-shadow:0 0 12px var(--brand-glow);position:relative}
.pbar-fill.full{background:linear-gradient(90deg,var(--success),var(--success-2));box-shadow:0 0 12px rgba(16,185,129,.4)}

/* Day tabs */
.wnav{display:flex;align-items:center;gap:8px;padding-bottom:12px}
.nbtn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);
  border-radius:10px;padding:9px 12px;font-size:16px;cursor:pointer;
  transition:all .15s;font-weight:600}
.nbtn:active{background:var(--surface-2);transform:scale(.95)}
.dtabs{display:flex;gap:5px;flex:1}
.dtab{flex:1;padding:9px 4px;border-radius:10px;border:1px solid transparent;
  font-size:11px;font-weight:700;letter-spacing:1.5px;cursor:pointer;
  color:var(--text-3);background:var(--surface);transition:all .2s}
.dtab.on{background:linear-gradient(135deg,var(--brand-3),var(--brand));color:#fff;
  box-shadow:0 4px 12px var(--brand-glow);border-color:var(--brand)}
.dtab.has-data:not(.on){border-color:var(--border-strong);color:var(--text-2)}

/* View tabs */
.vtabs{display:flex;gap:0;border-bottom:1px solid var(--border-soft)}
.vtab{flex:1;padding:12px 0;font-size:10px;font-weight:700;letter-spacing:2px;
  color:var(--text-dim);border:none;border-bottom:2px solid transparent;
  cursor:pointer;background:none;transition:all .15s;position:relative}
.vtab.on{color:var(--brand-2)}
.vtab.on::after{content:"";position:absolute;left:20%;right:20%;bottom:-1px;height:2px;
  background:linear-gradient(90deg,var(--brand-3),var(--brand),var(--accent));border-radius:2px}

/* ─── CONTENT ───────────────────────────────────────────────── */
#content{padding:14px 14px 20px}
.sec-lbl{font-size:10px;color:var(--text-3);letter-spacing:2.5px;
  text-transform:uppercase;font-weight:700;margin:6px 4px 14px;
  display:flex;justify-content:space-between;align-items:center}
.sec-lbl .count{color:var(--text-dim)}

/* ─── EXERCISE CARD ─────────────────────────────────────────── */
.ecard{background:linear-gradient(180deg,var(--surface),var(--surface-2));
  border:1px solid var(--border);border-radius:var(--r-lg);
  margin-bottom:12px;padding:16px;position:relative;overflow:hidden;
  transition:all .25s cubic-bezier(.4,0,.2,1)}
.ecard::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--border-strong),transparent)}
.ecard.done{background:linear-gradient(180deg,#0a1f15,#0e2a1d);border-color:#1a4a30}
.ecard.done::before{background:linear-gradient(90deg,transparent,var(--success),transparent)}

.ehdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px}
.ename{font-size:17px;font-weight:700;letter-spacing:-0.02em;line-height:1.25;color:var(--text)}
.ecard.done .ename{color:var(--success-2)}
.emeta{font-size:10px;color:var(--text-3);margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;font-weight:500}
.emeta span{background:var(--surface-3);padding:3px 8px;border-radius:99px;
  border:1px solid var(--border);letter-spacing:.5px}
.emeta .group-pill{background:rgba(168,85,247,.12);color:var(--brand-2);border-color:rgba(168,85,247,.25)}

.sbadge{font-size:10px;font-weight:800;padding:4px 10px;border-radius:99px;
  white-space:nowrap;letter-spacing:1px;display:inline-flex;align-items:center;gap:4px}

/* Stats row — solo en Historial */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.stat-box{background:var(--surface-3);border:1px solid var(--border);
  border-radius:var(--r);padding:8px;text-align:center}
.stat-lbl{font-size:8.5px;color:var(--text-dim);letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.stat-val{font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em}
.stat-val.gold{color:var(--gold)}
.stat-val.blue{color:var(--info)}
.stat-val.purple{color:var(--brand-2)}

/* ─── PDF EXPORT BUTTON ──────────────────────────────────────── */
.pdf-row{display:flex;gap:8px;margin-bottom:14px}
.pdf-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:13px;border-radius:var(--r);border:1px solid var(--border-strong);
  background:var(--surface-2);color:var(--text-2);font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.5px;transition:all .15s}
.pdf-btn:active{transform:scale(.97);background:var(--surface-3)}
.pdf-btn .ico{font-size:17px}

/* ─── WEIGHT CONTROL (nuevo — táctil, mantener pulsado) ──────── */
.weight-block{margin-bottom:14px}
.weight-label-row{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px}
.weight-tag{font-size:9px;color:var(--text-3);letter-spacing:2.5px;font-weight:700;
  text-transform:uppercase}
.plate-btn{background:transparent;border:none;color:var(--brand-2);
  font-size:13px;cursor:pointer;padding:2px 6px;font-weight:700;
  text-decoration:underline;text-underline-offset:3px}
.weight-ctrl{display:grid;grid-template-columns:68px 1fr 68px;
  align-items:center;gap:0;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden}
.w-btn{width:100%;height:64px;border:none;background:var(--surface-2);
  color:var(--text);font-size:28px;font-weight:300;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s,transform .08s;
  font-family:'JetBrains Mono',monospace;user-select:none;-webkit-user-select:none}
.w-btn:active,.w-btn.pressing{background:var(--brand-3);color:#fff}
.w-btn.minus{border-right:1px solid var(--border)}
.w-btn.plus{border-left:1px solid var(--border)}
.w-center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:64px;cursor:text;padding:0 6px}
.winput{width:100%;background:transparent;border:none;color:var(--text);
  font-size:30px;font-weight:800;padding:0;text-align:center;
  font-family:'JetBrains Mono',monospace;letter-spacing:-0.04em;outline:none}
.winput::placeholder{color:var(--text-dim)}
.w-unit{font-size:10px;color:var(--text-dim);font-weight:600;
  font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-top:-2px}
.w-step-hint{font-size:9px;color:var(--text-dim);margin-top:3px;text-align:center;letter-spacing:.5px}

/* ─── SETS TABLE ────────────────────────────────────────────── */
.sets-wrap{margin-bottom:14px}
.sets-head{display:grid;grid-template-columns:28px 1fr 1fr 52px 44px;
  gap:6px;padding:0 2px 8px;font-size:9px;color:var(--text-dim);
  letter-spacing:1.5px;font-weight:700;text-transform:uppercase;text-align:center;
  border-bottom:1px solid var(--border-soft)}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 52px 44px;
  gap:6px;align-items:center;padding:7px 2px;
  border-bottom:1px solid var(--border-soft);transition:background .12s}
.set-row:last-child{border-bottom:none}
.set-row.active-set{background:rgba(168,85,247,.07);border-radius:10px;
  margin:0 -4px;padding:7px 6px}
.set-num{font-size:13px;font-weight:800;color:var(--text-dim);text-align:center;
  font-family:'JetBrains Mono',monospace}
.set-row.active-set .set-num{color:var(--brand-2)}
.set-row.done-set .set-num{color:var(--success)}

.set-input{width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:15px;font-weight:700;
  padding:9px 4px;text-align:center;font-family:'JetBrains Mono',monospace;
  letter-spacing:-0.02em;outline:none;transition:all .15s}
.set-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}
.set-input.hit{color:var(--success-2);border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.set-input.miss{color:var(--warn-2);border-color:rgba(245,158,11,.25)}
.set-input::placeholder{color:var(--text-dim);font-weight:500}

.set-done-btn{width:100%;height:40px;border-radius:10px;
  border:1.5px solid var(--border-strong);background:var(--surface-2);
  color:var(--text-dim);font-size:18px;font-weight:700;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;justify-content:center}
.set-done-btn.on{background:linear-gradient(135deg,var(--success),#059669);
  border-color:var(--success);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.3)}
.set-done-btn:active{transform:scale(.9)}

.rest-mini{width:100%;height:40px;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-3);font-size:14px;cursor:pointer;transition:all .15s}
.rest-mini:active{background:var(--surface-2)}

/* ─── START SET BUTTON ──────────────────────────────────────── */
.start-set-btn{width:100%;padding:16px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--brand-3),var(--brand));
  color:#fff;font-size:14px;font-weight:800;letter-spacing:2px;
  cursor:pointer;margin-bottom:10px;
  box-shadow:0 4px 20px var(--brand-glow);
  transition:all .15s;
  position:relative;overflow:hidden}
.start-set-btn::before{content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,.15),transparent);
  transform:translateX(-100%);transition:transform .6s}
.start-set-btn:active{transform:scale(.97);box-shadow:0 2px 10px var(--brand-glow)}
.start-set-btn:active::before{transform:translateX(100%)}
.start-set-btn.done-all{background:linear-gradient(135deg,var(--success),#059669);
  box-shadow:0 4px 20px rgba(16,185,129,.3)}
.start-set-btn:disabled{opacity:.7;cursor:default}

/* ─── COACH INSIGHT ──────────────────────────────────────────── */
.coach-tip{margin-top:10px;padding:10px 12px;border-radius:var(--r);
  background:linear-gradient(135deg,rgba(168,85,247,.1),rgba(192,132,252,.05));
  border:1px solid rgba(168,85,247,.25);
  font-size:11.5px;color:var(--text-2);line-height:1.5;
  display:flex;gap:8px;align-items:flex-start}
.coach-tip .ico{font-size:14px;flex-shrink:0}
.coach-tip b{color:var(--brand-2);font-weight:700}
.coach-tip.warn{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(251,191,36,.05));border-color:rgba(245,158,11,.25)}
.coach-tip.warn b{color:var(--warn-2)}
.coach-tip.success{background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(52,211,153,.05));border-color:rgba(16,185,129,.25)}
.coach-tip.success b{color:var(--success-2)}

/* ─── COMPLETE BUTTONS ──────────────────────────────────────── */
.crow{display:flex;gap:8px;margin-top:4px}
.cbtn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border-strong);
  color:var(--text-3);font-size:11.5px;font-weight:700;cursor:pointer;
  background:transparent;letter-spacing:1.2px;transition:all .15s}
.cbtn.yes.on{border-color:var(--success);background:rgba(16,185,129,.12);color:var(--success-2)}
.cbtn.no.on{border-color:var(--danger);background:rgba(239,68,68,.12);color:var(--danger)}
.cbtn:active{transform:scale(.97)}

/* ─── NEXT WEEK PREVIEW ─────────────────────────────────────── */
.nprev{margin-top:10px;padding:10px 14px;
  background:linear-gradient(90deg,rgba(168,85,247,.08),rgba(168,85,247,.02));
  border-radius:var(--r);border:1px solid rgba(168,85,247,.2);
  display:flex;justify-content:space-between;align-items:center}
.nlbl{font-size:9px;color:var(--text-3);letter-spacing:1.5px;font-weight:700}
.nval{font-size:16px;font-weight:800;color:var(--brand-2);font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em}
.nval .delta{font-size:10px;color:var(--success-2);margin-left:4px;font-weight:700}

/* ─── NOTES ─────────────────────────────────────────────────── */
.note-toggle{width:100%;margin-top:8px;padding:9px;border-radius:10px;
  border:1px solid var(--border);background:transparent;color:var(--text-3);
  font-size:11px;cursor:pointer;text-align:left;font-weight:600;transition:all .12s}
.note-toggle:active{background:var(--surface)}
.note-box{width:100%;margin-top:6px;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:12.5px;padding:10px 12px;
  resize:none;outline:none;line-height:1.5;font-family:inherit}
.note-box:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}

/* ─── REST TIMER OVERLAY ────────────────────────────────────── */
#timer-overlay{display:none;position:fixed;inset:0;
  background:radial-gradient(ellipse at center,rgba(26,13,46,.97),rgba(11,11,18,.98));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#timer-overlay.show{display:flex;animation:timerIn .35s cubic-bezier(.4,0,.2,1)}
@keyframes timerIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.timer-ex{font-size:13px;color:var(--brand-2);margin-bottom:10px;text-align:center;
  font-weight:700;letter-spacing:1px;text-transform:uppercase}
.timer-set-info{font-size:11px;color:var(--text-3);margin-bottom:24px;
  font-family:'JetBrains Mono',monospace}

.timer-ring{width:240px;height:240px;position:relative;margin-bottom:32px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:6;transition:stroke-dashoffset .9s linear,stroke .3s}
.timer-ring .bg{stroke:var(--surface-2)}
.timer-ring .fg{stroke:url(#timerGrad);stroke-linecap:round}
.timer-num{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center}
.timer-sec{font-size:64px;font-weight:800;color:#fff;
  font-family:'JetBrains Mono',monospace;letter-spacing:-0.04em;line-height:1}
.timer-lbl{font-size:9px;color:var(--text-3);letter-spacing:4px;
  margin-top:8px;font-weight:700}

.timer-controls{display:flex;gap:10px}
.timer-btn{padding:13px 22px;border-radius:12px;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:1.5px;transition:all .15s}
.timer-add{background:var(--surface);border:1px solid var(--border-strong);color:var(--text-2)}
.timer-skip{background:linear-gradient(135deg,var(--brand-3),var(--brand));
  border:none;color:#fff;box-shadow:0 4px 12px var(--brand-glow)}
.timer-btn:active{transform:scale(.95)}

/* ─── BOTTOM BAR ────────────────────────────────────────────── */
#bbar{position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(transparent 0%,var(--bg) 60%);
  padding:20px 16px max(20px,env(safe-area-inset-bottom));
  display:flex;justify-content:center;z-index:40;pointer-events:none}
.bpills{background:var(--surface);border:1px solid var(--border);
  border-radius:99px;padding:8px;display:flex;gap:4px;
  box-shadow:var(--sh-3);pointer-events:auto}
.bpill{cursor:pointer;color:var(--text-3);font-size:10.5px;font-weight:700;
  padding:7px 12px;border-radius:99px;letter-spacing:.5px;
  transition:all .15s;display:flex;align-items:center;gap:5px}
.bpill .num{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text-dim)}
.bpill.p{color:var(--brand-2);background:rgba(168,85,247,.1)}
.bpill.f{color:var(--success-2);background:rgba(16,185,129,.1)}
.bpill.f .num{color:var(--success)}

/* ─── CHART PREMIUM (como referencia) ───────────────────────── */
.hcard{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden}
.hcard-head{display:flex;justify-content:space-between;align-items:flex-start;
  padding:14px 16px 0}
.hcard-name{font-size:15px;font-weight:700;letter-spacing:-0.01em}
.hcard-group{font-size:10px;font-weight:600;margin-top:3px;letter-spacing:.5px}
.hcard-delta{font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;
  background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.hcard-delta.neg{background:rgba(248,113,113,.1);color:#f87171;border-color:rgba(248,113,113,.2)}
.chart-area{padding:10px 16px 0;position:relative}
.chart-svg-p{width:100%;display:block}

function calc1RM(weight, reps){
  if(!weight||!reps||reps<=0) return 0;
  if(reps===1) return weight;
  return Math.round(weight * (1 + Math.min(reps,30)/30));
}

  // Ensure structure
  while(sets.length < defSets){
    sets.push({reps:null, weight:null, rir:null, done:false});
  }
  // If old format (number) convert
  sets = sets.map(function(s){
    if(typeof s === "number" || s===null){
      return {reps:s, weight:null, rir:null, done:false};
    }
    return s;
  });
  return {
    mainWeight: stored.mainWeight !== undefined ? stored.mainWeight : (def.weight || 0),
    completed: stored.completed || null,
    sets: sets
  };
}
function setE(w,d,ex,upd){
  var k=ekey(w,d,ex);
  db[k]=Object.assign({},db[k]||{},upd);
  save();
}
function getH(d,ex){ return db[hkey(d,ex)]||[]; }
function addH(d,ex,w){
  if(!w) return;
  var h=db[hkey(d,ex)]||[];
  if(h.indexOf(w)===-1){ db[hkey(d,ex)]=h.concat([w]); save(); }
}
function getNote(w,d,ex){ return db[nkey(w,d,ex)]||""; }
function setNote(w,d,ex,v){ db[nkey(w,d,ex)]=v; save(); }

function r25(v){ return Math.round(v*4)/4; }

/* ─── SMART COACH (next-week prediction) ──────────────────────
   Inputs: average RIR last sets, success rate of reps target,
   trend of last 3 weeks. Returns next weight + reasoning. */
function smartNextWeight(w,d,ex){
  var def = (PROGRAM[d]||[]).find(function(e){return e.name===ex;}) || {};
  var entry = getE(w,d,ex);
  if(!entry.mainWeight) return {weight:0, reason:"", action:"keep"};

  // Collect data from completed sets this week
  var doneSets = (entry.sets||[]).filter(function(s){return s && s.done && s.reps!=null;});
  if(doneSets.length===0){
    return {weight:entry.mainWeight, reason:"Sin datos", action:"keep"};
  }

  // Avg RIR
  var rirs = doneSets.map(function(s){return s.rir;}).filter(function(r){return r!=null;});
  var avgRIR = rirs.length ? rirs.reduce(function(a,b){return a+b;},0)/rirs.length : null;

  // Hit rate (% sets where reps >= target)
  var hits = 0, total = 0;
  doneSets.forEach(function(s,i){
    var target = def.reps[i] || def.reps[def.reps.length-1];
    total++;
    if(s.reps >= target) hits++;
  });
  var hitRate = total>0 ? hits/total : 0;

  // Last 3 weeks weight trend
  var recentW = [];
  for(var i=Math.max(1,w-2); i<=w; i++){
    var e = getE(i,d,ex);
    if(e.mainWeight) recentW.push(e.mainWeight);
  }
  var stagnant = recentW.length >=3 && recentW[0]===recentW[recentW.length-1];

  var cur = entry.mainWeight;
  var next = cur, action="keep", reason="Mantén carga";

  // Decision tree
  if(entry.completed === "NO"){
    next = r25(cur*0.95);
    action="deload";
    reason="No completaste · −5%";
  } else if(stagnant && hitRate < 0.5){
    next = r25(cur*0.9);
    action="deload";
    reason="Estancado · semana de descarga −10%";
  } else if(hitRate === 1 && avgRIR !== null && avgRIR >= 2){
    next = r25(cur*PROG_RATES.aggressive);
    action="big_up";
    reason="Dominado con RIR "+avgRIR.toFixed(1)+" · +7.5%";
  } else if(hitRate === 1 && (avgRIR===null || avgRIR >= 1)){
    next = r25(cur*PROG_RATES.moderate);
    action="up";
    reason="Completado · +5%";
  } else if(hitRate >= 0.5){
    next = r25(cur*PROG_RATES.conservative);
    action="small_up";
    reason="Buen trabajo · +2.5%";
  } else {
    next = cur;
    action="keep";
    reason="Repite carga · técnica primero";
  }

  return {weight:next, reason:reason, action:action, avgRIR:avgRIR, hitRate:hitRate};
}

function calcStatus(cur,hist){
  if(!cur||!hist.length) return null;
  var mx=Math.max.apply(null,hist);
  var last=hist[hist.length-1];
  if(cur>mx) return "PR";
  if(cur>last) return "SUBIR";
  if(cur===last) return "MANT";
  return "BAJAR";
}

/* Crea un tono con envolvente ADSR */
function tone(freq, startT, dur, vol, type, detune){
  if(!audioCtx) return;
  try{
    var osc  = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    // Compressor para evitar clipping
    var comp = audioCtx.createDynamicsCompressor();
    osc.connect(gain); gain.connect(comp); comp.connect(audioCtx.destination);
    osc.type = type||"sine";
    osc.frequency.value = freq;
    if(detune) osc.detune.value = detune;
    // Ataque rápido, sustain, decay suave
    gain.gain.setValueAtTime(0, startT);
    gain.gain.linearRampToValueAtTime(vol, startT + 0.01);
    gain.gain.setValueAtTime(vol, startT + dur*0.6);
    gain.gain.exponentialRampToValueAtTime(0.0001, startT + dur);
    osc.start(startT); osc.stop(startT + dur + 0.05);
  }catch(e){}
}

/* 
  SONIDO "¡A ENTRENAR!" — timer fin:
  Acorde de Do Mayor (C5-E5-G5) en tres pulsos ascendentes
  + capa de "campana" (triangle, alta) para que quede en la mente.
  Volumen alto, imposible ignorarlo.
*/
function playTimerEnd(){
  if(!audioCtx) return;
  var t = audioCtx.currentTime;
  // Pulso 1 — Do mayor bajo (impacto)
  tone(261.6, t,       0.35, 0.9, "triangle");
  tone(329.6, t,       0.35, 0.7, "sine");
  tone(392.0, t,       0.35, 0.7, "sine");
  // Pulso 2 — una octava arriba (más brillante)
  tone(523.2, t+0.38,  0.35, 0.9, "triangle");
  tone(659.2, t+0.38,  0.35, 0.7, "sine");
  tone(784.0, t+0.38,  0.35, 0.7, "sine");
  // Pulso 3 — acorde Do Mayor alta (¡YA!) con detune ligero para cuerpo
  tone(1046.5, t+0.76, 0.7,  1.0, "triangle");
  tone(1318.5, t+0.76, 0.7,  0.8, "sine",  +5);
  tone(1568.0, t+0.76, 0.7,  0.8, "sine",  -5);
  // Capa de campana encima (triangle altísima, corta)
  tone(2093.0, t+0.76, 0.4,  0.5, "triangle");

  // Vibración: patrón que se siente como "BOOM-BOOM-BOOM-largo"
  // Agresivo para que se note con el teléfono en el bolsillo
  if(navigator.vibrate){
    navigator.vibrate([0, 50, 150, 50, 150, 50, 400]);
  }
}

/* ─── TIMER ──────────────────────────────────────────────────── */
var timerRAF=null, timerEndTs=0, timerTotal=0, timerActive=false, timerExName="";
var CIRC=678; // 2 * pi * 108

function startTimer(secs, exName, setInfo){
  timerActive=true;
  timerExName=exName||"";
  timerEndTs = Date.now() + secs*1000;
  timerTotal = secs;
  document.getElementById("timer-ex-name").textContent = exName;
  document.getElementById("timer-set-info").textContent = setInfo || "";
  document.getElementById("timer-overlay").classList.add("show");
  if(timerRAF) cancelAnimationFrame(timerRAF);
  // Start session if not started
  if(!state.sessionStart) state.sessionStart = Date.now();
  tickTimer();
}
function tickTimer(){
  if(!timerActive) return;
  var remaining = Math.max(0, Math.ceil((timerEndTs - Date.now())/1000));
  updateTimerDisplay(remaining);
  if(remaining<=0){
    timerActive=false;
    playTimerEnd();
    sendTimerNotif(timerExName);
    setTimeout(stopTimer, 1200);
    return;
  }
  timerRAF = requestAnimationFrame(tickTimer);
}
function updateTimerDisplay(secs){
  document.getElementById("timer-sec").textContent = secs;
  var pct = timerTotal>0 ? secs/timerTotal : 0;
  document.getElementById("timer-arc").style.strokeDashoffset = CIRC*(1-pct);
}
function stopTimer(){
  timerActive=false;
  if(timerRAF){ cancelAnimationFrame(timerRAF); timerRAF=null; }
  document.getElementById("timer-overlay").classList.remove("show");
}
document.getElementById("timer-skip-btn").onclick = stopTimer;
document.getElementById("timer-add-btn").onclick = function(){
  timerEndTs += 15000;
  timerTotal = Math.max(timerTotal, Math.ceil((timerEndTs-Date.now())/1000));
};

/* ─── PLATE CALCULATOR ───────────────────────────────────────── */
var PLATES_KG = [25, 20, 15, 10, 5, 2.5, 1.25];
var PLATE_COLORS = {25:"#dc2626", 20:"#1d4ed8", 15:"#facc15", 10:"#16a34a", 5:"#fff", 2.5:"#000", 1.25:"#475569"};
var PLATE_TEXT_COLORS = {25:"#fff", 20:"#fff", 15:"#000", 10:"#fff", 5:"#000", 2.5:"#fff", 1.25:"#fff"};
function calcPlates(target, barWeight){
  barWeight = barWeight || 20;
  if(target < barWeight) return null;
  var perSide = (target - barWeight) / 2;
  var result = [];
  PLATES_KG.forEach(function(p){
    var n = Math.floor(perSide/p);
    if(n>0){ result.push({plate:p, count:n}); perSide -= n*p; }
  });
  return result;
}
function showPlateModal(weight){
  var modal = document.getElementById("plate-modal");
  var sub = document.getElementById("plate-sub");
  var visual = document.getElementById("plate-visual");
  var list = document.getElementById("plate-list");
  visual.innerHTML = ""; list.innerHTML = "";

  var plates = calcPlates(weight, 20);
  if(!plates){
    sub.textContent = "Peso menor que la barra (20 kg)";
    visual.innerHTML = '<div style="color:var(--text-3);font-size:12px">No requiere discos</div>';
    modal.classList.add("show");
    return;
  }
  sub.textContent = "Por lado · barra olímpica 20 kg · "+weight+" kg total";

  // Visual: plates on left, bar in middle, plates on right
  var sizes = {25:42, 20:38, 15:34, 10:30, 5:24, 2.5:20, 1.25:16};
  var leftHtml = "";
  plates.forEach(function(p){
    for(var i=0;i<p.count;i++){
      var sz = sizes[p.plate];
      leftHtml += '<div class="plate" style="width:'+(sz*0.35)+'px;height:'+sz+'px;background:'+PLATE_COLORS[p.plate]+';color:'+PLATE_TEXT_COLORS[p.plate]+'">'+p.plate+'</div>';
    }
  });
  visual.innerHTML = leftHtml + '<div class="collar"></div><div class="bar-piece"></div><div class="collar"></div>'+ leftHtml.split('').reverse().join('').replace(/>([^<]+)</g, function(m,p){return '>'+p.split('').reverse().join('')+'<';});
  // Simpler: just rebuild
  var rev = "";
  plates.slice().reverse().forEach(function(p){
    for(var i=0;i<p.count;i++){
      var sz = sizes[p.plate];
      rev += '<div class="plate" style="width:'+(sz*0.35)+'px;height:'+sz+'px;background:'+PLATE_COLORS[p.plate]+';color:'+PLATE_TEXT_COLORS[p.plate]+'">'+p.plate+'</div>';
    }
  });
  visual.innerHTML = leftHtml + '<div class="collar"></div><div class="bar-piece"></div><div class="collar"></div>' + rev;

  plates.forEach(function(p){
    var row = document.createElement("div"); row.className="plate-row";
    row.innerHTML = '<span>Disco de '+p.plate+' kg</span><span class="count">×'+p.count+' por lado</span>';
    list.appendChild(row);
  });
  modal.classList.add("show");
}

/* ─── STATS GLOBALES (para achievements y motivación) ─────── */
function getGlobalStats(){
  var totalDays=0, fullWeeks=0, totalPRs=0, maxLift=0, maxSessionVolume=0;
  var weekCompletion = {}; // week -> [day completed booleans]

  Object.keys(PROGRAM).forEach(function(d){
    for(var w=1; w<=52; w++){
      var allDone = true;
      var sessionVol = 0;
      var hasAny = false;
      PROGRAM[d].forEach(function(exDef){
        var entry = getE(w,d,exDef.name);
        if(entry.completed === "SI") hasAny = true;
        else allDone = false;
        var v = calcSetVolume(entry.sets);
        sessionVol += v;
        if(entry.mainWeight > maxLift) maxLift = entry.mainWeight;
      });
      if(hasAny && allDone) totalDays++;
      if(sessionVol > maxSessionVolume) maxSessionVolume = sessionVol;
      if(!weekCompletion[w]) weekCompletion[w] = {};
      weekCompletion[w][d] = allDone && hasAny;
    }
  });
  // Full weeks = all 3 days complete
  var weeks = Object.keys(weekCompletion).map(Number).sort(function(a,b){return a-b;});
  var streak = 0, bestStreak = 0;
  weeks.forEach(function(w){
    var wc = weekCompletion[w];
    var dayKeys = Object.keys(PROGRAM);
    var full = dayKeys.every(function(d){return wc[d];});
    if(full){ fullWeeks++; streak++; if(streak>bestStreak) bestStreak = streak; }
    else streak = 0;
  });

  // PRs: count history entries that are new max
  Object.keys(PROGRAM).forEach(function(d){
    PROGRAM[d].forEach(function(exDef){
      var hist = getH(d, exDef.name);
      var mx = 0;
      hist.forEach(function(w){ if(w>mx){ mx=w; totalPRs++; } });
    });
  });

  // Current streak ending at current week
  var currentStreak = 0;
  for(var w=state.week; w>=1; w--){
    var wc = weekCompletion[w] || {};
    var dayKeys = Object.keys(PROGRAM);
    var full = dayKeys.every(function(d){return wc[d];});
    if(full) currentStreak++;
    else break;
  }

  return {
    totalDays:totalDays, fullWeeks:fullWeeks, totalPRs:totalPRs,
    maxLift:maxLift, maxSessionVolume:maxSessionVolume,
    bestStreak:bestStreak, currentStreak:currentStreak
  };
}

/* ─── HEATMAP (volumen por grupo, semana actual) ────────────── */
function getMuscleHeatmap(week){
  var vols = {pecho:0, espalda:0, piernas:0, hombros:0, brazos:0, core:0};
  Object.keys(PROGRAM).forEach(function(d){
    PROGRAM[d].forEach(function(exDef){
      var entry = getE(week,d,exDef.name);
      var v = calcSetVolume(entry.sets);
      if(v>0 && exDef.group){
        vols[exDef.group] = (vols[exDef.group]||0) + v;
      }
    });
  });
  return vols;
}

/* ─── MOMENTUM (4 semanas atrás) ─────────────────────────────── */
function getMomentum(){
  var cur = getMuscleHeatmap(state.week);
  var pastWeek = Math.max(1, state.week - 4);
  var past = getMuscleHeatmap(pastWeek);
  var curTotal = Object.values(cur).reduce(function(a,b){return a+b;},0);
  var pastTotal = Object.values(past).reduce(function(a,b){return a+b;},0);
  // Best lift (1RM) cur vs past
  var curMax=0, pastMax=0;
  Object.keys(PROGRAM).forEach(function(d){
    PROGRAM[d].forEach(function(exDef){
      var ec = getE(state.week,d,exDef.name);
      var ep = getE(pastWeek,d,exDef.name);
      if(ec.mainWeight > curMax) curMax = ec.mainWeight;
      if(ep.mainWeight > pastMax) pastMax = ep.mainWeight;
    });
  });
  return {
    curVol:curTotal, pastVol:pastTotal,
    curMax:curMax, pastMax:pastMax,
    pastWeek:pastWeek
  };
}

/* Excel/CSV — descarga directa, funciona en Safari */
function exportExcel(){
  var d = buildExportData();
  var rows = [["Ejercicio","Grupo","Peso (kg)","S1","S2","S3","S4","Estado"]];
  d.exs.forEach(function(exDef){
    var entry = getE(state.week,state.day,exDef.name);
    var comp = entry.completed==="SI"?"Completado":entry.completed==="NO"?"No hecho":"Pendiente";
    var row = [exDef.name, exDef.group||"", entry.mainWeight||""];
    for(var i=0;i<4;i++){
      var s = (entry.sets||[])[i];
      if(s&&s.reps!=null){
        var w = s.weight!=null?s.weight:(entry.mainWeight||"");
        row.push(w+"kg x "+s.reps+(s.done?" ✓":""));
      } else { row.push(""); }
    }
    row.push(comp);
    rows.push(row);
  });
  rows.push([]);
  rows.push(["Completados", d.totalDone+" / "+d.exs.length]);
  rows.push(["Fecha", d.dateStr]);
  rows.push(["Semana", state.week+" de 52"]);
  rows.push(["Día", DAY_LABELS[state.day]]);

  var csv = rows.map(function(r){
    return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(",");
  }).join("\n");

  var blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "GymTracker_S"+String(state.week).padStart(2,"0")+"_"+state.day+".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},3000);
}

  if(old) old.remove();

  var modal = document.createElement("div");
  modal.id = "_resumen_modal";
  modal.style.cssText = "position:fixed;inset:0;z-index:600;background:#fff;"+
    "overflow-y:auto;font-family:-apple-system,system-ui,sans-serif;color:#111";

  // Cabecera

    var row = document.createElement("div");
    row.style.cssText = "border-left:3px solid "+gc+";padding:10px 12px;margin-bottom:8px;"+

function buildExerciseCard(exDef){
  var ex = exDef.name;
  var entry = getE(state.week,state.day,ex);
  var hist = getH(state.day,ex);
  var status = calcStatus(entry.mainWeight, hist);
  var doneCount = (entry.sets||[]).filter(function(s){return s && s.done;}).length;
  var allDone = doneCount >= exDef.sets;
  var done = entry.completed === "SI";
  var nextSetIdx = doneCount;

  var card = document.createElement("div");
  card.className = "ecard" + (done?" done":"");
  card.setAttribute("data-ex", ex);

  // ── 1) Header: nombre + badge estado ────────────────────────
  var hd = document.createElement("div"); hd.className="ehdr";
  var left = document.createElement("div");
  var nm = document.createElement("div"); nm.className="ename"; nm.textContent=ex;
  left.appendChild(nm);
  var meta = document.createElement("div"); meta.className="emeta";
  var gp = document.createElement("span"); gp.className="group-pill";
  gp.textContent=(GROUP_ICON[exDef.group]||"")+" "+(exDef.group||"").toUpperCase();
  meta.appendChild(gp);
  var s1 = document.createElement("span"); s1.textContent=exDef.sets+" series · "+exDef.reps.join("/")+" reps"; meta.appendChild(s1);
  var s2 = document.createElement("span"); s2.textContent="⏱ "+exDef.rest+"s"; meta.appendChild(s2);
  left.appendChild(meta);
  hd.appendChild(left);
  if(status){
    var sc = S_CFG[status];
    var badge = document.createElement("span"); badge.className="sbadge";
    badge.innerHTML = '<span style="width:6px;height:6px;border-radius:50%;display:inline-block;'+
      'background:'+sc.dot+';box-shadow:0 0 5px '+sc.dot+'90;flex-shrink:0"></span> '+sc.label;
    badge.style.cssText="background:"+sc.bg+";color:"+sc.color+
      ";border:1px solid "+sc.color+"28;font-size:9px;letter-spacing:1.8px;padding:5px 10px";
    hd.appendChild(badge);
  }
  card.appendChild(hd);

  // ── 2) PESO GENERAL — botones simples solo click ────────────
  var wb = document.createElement("div"); wb.className="weight-block";

  var wlr = document.createElement("div"); wlr.className="weight-label-row";
  var wtag = document.createElement("span"); wtag.className="weight-tag"; wtag.textContent="Peso del ejercicio";
  wlr.appendChild(wtag);
  wb.appendChild(wlr);

  var wc = document.createElement("div"); wc.className="weight-ctrl";

  var bMinus = document.createElement("button"); bMinus.className="w-btn minus"; bMinus.textContent="−";
  var bPlus  = document.createElement("button"); bPlus.className="w-btn plus";  bPlus.textContent="+";
  var wCent  = document.createElement("div");    wCent.className="w-center";
  var wInp   = document.createElement("input");
  wInp.type="number"; wInp.step="0.25"; wInp.min="0"; wInp.className="winput";
  wInp.value = entry.mainWeight||""; wInp.placeholder="0";
  var wUn    = document.createElement("div"); wUn.className="w-unit"; wUn.textContent="KG";
  wCent.appendChild(wInp); wCent.appendChild(wUn);

  // Solo click — sin hold, sin touchstart, sin doble disparo
  bMinus.onclick = function(){
    var cur = getE(state.week,state.day,ex).mainWeight||0;
    setMainWeight(ex, Math.max(0, r25(cur-2.5)));
  };
  bPlus.onclick = function(){
    var cur = getE(state.week,state.day,ex).mainWeight||0;
    setMainWeight(ex, r25(cur+2.5));
  };
  wInp.onchange = function(){
    var v = parseFloat(wInp.value);
    if(!isNaN(v)) setMainWeight(ex, Math.max(0, r25(v)));
  };

  wc.appendChild(bMinus); wc.appendChild(wCent); wc.appendChild(bPlus);
  wb.appendChild(wc);
  card.appendChild(wb);

  // ── 3) BOTÓN EMPEZAR SERIE ───────────────────────────────────
  var startBtn = document.createElement("button");
  startBtn.className = "start-set-btn" + (allDone?" done-all":"");
  startBtn.disabled = allDone;
  startBtn.textContent = allDone
    ? "✓  TODAS LAS SERIES COMPLETADAS"
    : "▶  EMPEZAR SERIE  " + (nextSetIdx+1) + " / " + exDef.sets;
  startBtn.onclick = function(){ if(!allDone) completeSet(ex, nextSetIdx); };
  card.appendChild(startBtn);

  // ── 4) TABLA DE SERIES ───────────────────────────────────────
  var sw = document.createElement("div"); sw.className="sets-wrap";
  var sHead = document.createElement("div"); sHead.className="sets-head";
  sHead.innerHTML = '<span>#</span><span>PESO</span><span>REPS</span><span>✓</span><span>⏱</span>';
  sw.appendChild(sHead);

  for(var si=0; si<exDef.sets; si++){
    (function(si){
      var sd = entry.sets[si] || {reps:null,weight:null,rir:null,done:false};
      var target = exDef.reps[si] || exDef.reps[exDef.reps.length-1];
      var row = document.createElement("div");
      row.className = "set-row"
        + (sd.done ? " done-set" : "")
        + (si===nextSetIdx && !allDone ? " active-set" : "");

      // Nº serie
      var sn = document.createElement("div"); sn.className="set-num"; sn.textContent=si+1;
      row.appendChild(sn);

      // Peso por serie: independiente del global
      // PESO POR SERIE — Lógica:
      // 1) Si la serie ya tiene un peso guardado (sd.weight != null) → ese
      // 2) Si no → mostrar el peso global como valor inicial visible
      // El cambio del global NO modifica este valor una vez fijado en setMainWeight
      var wI = document.createElement("input"); wI.type="number"; wI.step="0.25"; wI.min="0";
      wI.className="set-input";
      // Mostrar valor: el guardado, o el global de referencia
      var displayWeight = sd.weight != null ? sd.weight : (entry.mainWeight > 0 ? entry.mainWeight : null);
      if(displayWeight != null) wI.value = displayWeight;
      wI.placeholder = "0";
      wI.onchange = function(){
        var v = wI.value===""?null:parseFloat(wI.value);
        updateSet(ex, si, {weight:v});
      };
      row.appendChild(wI);

      // Reps
      var rI = document.createElement("input"); rI.type="number"; rI.min="0"; rI.max="99";
      rI.className="set-input"; rI.placeholder=String(target);
      if(sd.reps!=null){
        rI.value=sd.reps;
        rI.classList.add(sd.reps>=target?"hit":"miss");
      }
      rI.onchange = function(){
        var v = rI.value===""?null:parseInt(rI.value);
        updateSet(ex, si, {reps:v});
      };
      row.appendChild(rI);

      // Botón completar serie
      var dBtn = document.createElement("button");
      dBtn.className = "set-done-btn" + (sd.done?" on":"");
      dBtn.innerHTML = sd.done ? "✓" : "<span style='font-size:20px;color:var(--text-dim)'>○</span>";
      dBtn.onclick = function(){ completeSet(ex, si); };
      row.appendChild(dBtn);

      // Botón descanso manual
      var rBtn = document.createElement("button"); rBtn.className="rest-mini"; rBtn.textContent="⏱";
      rBtn.onclick = function(){ startTimer(exDef.rest, ex, "Serie "+(si+1)+"/"+exDef.sets); };
      row.appendChild(rBtn);

      sw.appendChild(row);
    })(si);
  }
  card.appendChild(sw);

  // ── 5) Smart Coach (solo cuando todas las series hechas) ─────
  if(allDone){
    var coach = smartNextWeight(state.week,state.day,ex);
    var tip = document.createElement("div");
    tip.className="coach-tip"+(coach.action==="deload"?" warn":coach.action.indexOf("up")!==-1?" success":"");
    var cIco = {big_up:"🚀",up:"📈",small_up:"➡",keep:"⏸",deload:"🔄"}[coach.action]||"💡";
    tip.innerHTML='<span class="ico">'+cIco+'</span><div><b>Smart Coach:</b> '+coach.reason+'<br><span style="font-size:10px;color:var(--text-3)">Próx. semana → '+coach.weight+' kg</span></div>';
    card.appendChild(tip);
  }

  // ── 7) Botones completar ejercicio ──────────────────────────
  var cr = document.createElement("div"); cr.className="crow";
  [["SI","✓  COMPLETADO","yes"],["NO","✗  NO COMPLETADO","no"]].forEach(function(pair){
    var btn=document.createElement("button");
    btn.className="cbtn "+pair[2]+(entry.completed===pair[0]?" on":"");
    btn.textContent=pair[1];
    btn.onclick=function(){ doComplete(ex,pair[0]); };
    cr.appendChild(btn);
  });
  card.appendChild(cr);

  // ── 8) Preview próxima semana ────────────────────────────────
  if(entry.mainWeight && entry.completed){
    var c2=smartNextWeight(state.week,state.day,ex);
    var delta=c2.weight-entry.mainWeight;
    var np=document.createElement("div"); np.className="nprev";
    np.innerHTML='<span class="nlbl">PRÓX. SEMANA →</span><span class="nval mono">'+c2.weight+' kg'
      +(delta>0?'<span class="delta">+'+delta.toFixed(2)+'</span>'
        :delta<0?'<span class="delta" style="color:var(--danger)">'+delta.toFixed(2)+'</span>':'')+
      '</span>';
    card.appendChild(np);
  }

  // ── 9) Nota libre ────────────────────────────────────────────
  var nT=document.createElement("button"); nT.className="note-toggle";
  var existNote=getNote(state.week,state.day,ex);
  nT.textContent=existNote?"📝 Editar nota":"📝 Añadir nota";
  var nB=document.createElement("textarea"); nB.className="note-box"; nB.rows=2;
  nB.placeholder="Cómo te ha ido, técnica, sensaciones...";
  nB.value=existNote; nB.style.display=existNote?"block":"none";
  nB.onchange=function(){ setNote(state.week,state.day,ex,nB.value); };
  nT.onclick=function(){ nB.style.display=nB.style.display==="none"?"block":"none"; if(nB.style.display==="block") nB.focus(); };
  card.appendChild(nT); card.appendChild(nB);

  return card;
}

/* ─── ACTIONS — actualizan solo la tarjeta afectada, no todo el DOM ── */

/* Reemplaza en el DOM la tarjeta de un ejercicio sin tocar el resto */
function refreshCard(ex){
  var def = (PROGRAM[state.day]||[]).find(function(e){return e.name===ex;});
  if(!def) return;
  var newCard = buildExerciseCard(def);
  // Buscar la tarjeta existente por atributo data-ex
  var old = document.querySelector('[data-ex="'+ex+'"]');
  if(old && old.parentNode){
    old.parentNode.replaceChild(newCard, old);
  }
  // Actualizar solo el header (% y barra de progreso) y bottom bar
  refreshProgress();
}

function refreshProgress(){
  var exs = PROGRAM[state.day]||[];
  var done = exs.filter(function(ex){ return getE(state.week,state.day,ex.name).completed==="SI"; }).length;
  var pct = exs.length ? Math.round(done/exs.length*100) : 0;
  var pn = document.getElementById("pn");
  if(pn){ pn.textContent=pct+"%"; pn.className="ppct"+(pct===100?" full":""); }
  var pb = document.getElementById("pb");
  if(pb){ pb.style.width=pct+"%"; pb.className="pbar-fill"+(pct===100?" full":""); }
  // Bottom pills
  renderBottom();
}

function setMainWeight(ex, val){
  var entry = getE(state.week,state.day,ex);
  var prevGlobal = entry.mainWeight || 0;
  // Fijar el global "prestado" en cada serie antes de cambiar el global
  var sets = (entry.sets||[]).slice().map(function(s){
    if(s && s.weight == null && prevGlobal > 0){
      return Object.assign({}, s, {weight: prevGlobal});
    }
    return s;
  });
  setE(state.week,state.day,ex,{mainWeight:val, sets:sets});
  if(val>0) addH(state.day,ex,val);
  refreshCard(ex);
}

function updateSet(ex, idx, upd){
  var entry = getE(state.week,state.day,ex);
  var sets = entry.sets.slice();
  while(sets.length <= idx) sets.push({reps:null, weight:null, rir:null, done:false});
  sets[idx] = Object.assign({}, sets[idx], upd);
  setE(state.week,state.day,ex,{sets:sets});
  refreshCard(ex);
}

function completeSet(ex, idx){
  var entry = getE(state.week,state.day,ex);
  var def = (PROGRAM[state.day]||[]).find(function(e){return e.name===ex;});
  if(!def) return;
  var sets = entry.sets.slice();
  while(sets.length <= idx) sets.push({reps:null, weight:null, rir:null, done:false});
  var s = Object.assign({}, sets[idx]);
  if(!s.done){
    if(s.reps==null) s.reps = def.reps[idx] || def.reps[def.reps.length-1];
    s.done = true;
  } else {
    s.done = false;
  }
  sets[idx] = s;
  setE(state.week,state.day,ex,{sets:sets});
  if(s.done){
    playSuccess();
    if(!state.sessionStart) state.sessionStart = Date.now();
    startTimer(def.rest, ex, "Serie "+(idx+1)+"/"+def.sets+" completada");
    setTimeout(checkAchievements, 200);
  }
  refreshCard(ex);
}

function doComplete(ex, val){
  var entry = getE(state.week,state.day,ex);
  var nv = entry.completed === val ? null : val;
  setE(state.week,state.day,ex,{completed:nv});
  if(entry.mainWeight && nv && state.week<52){
    var coach = smartNextWeight(state.week, state.day, ex);
    setE(state.week+1, state.day, ex, {mainWeight: coach.weight});
  }
  if(nv === "SI"){
    playSuccess();
    checkAchievements();
  }
  refreshCard(ex);
}

/* ─── ACHIEVEMENTS CHECK ────────────────────────────────────── */
var unlockedSession = JSON.parse(localStorage.getItem("ach_unlocked")||"[]");
function checkAchievements(){
  var stats = getGlobalStats();
  ACHIEVEMENTS.forEach(function(ach){
    if(unlockedSession.indexOf(ach.id) === -1 && ach.check(stats)){
      unlockedSession.push(ach.id);
      localStorage.setItem("ach_unlocked", JSON.stringify(unlockedSession));
      // Sin toast — no interrumpir el entreno
    }
  });
}

function photoKey(week){ return "photo_w"+week; }
function getPhoto(week){ return db[photoKey(week)]||null; }
function setPhoto(week, b64){ db[photoKey(week)]=b64; save(); }

function buildHistory(c){
  var stats = getGlobalStats();

  // ── Streak card ─────────────────────────────────────────────
  var streak = document.createElement("div"); streak.className="streak-card";
  streak.innerHTML =
    '<div class="streak-fire">🔥</div>'+
    '<div class="streak-info"><div class="streak-num mono">'+stats.currentStreak+'</div><div class="streak-lbl">SEMANAS SEGUIDAS</div></div>'+
    '<div class="streak-best"><div class="streak-best-num mono">'+stats.bestStreak+'</div><div class="streak-best-lbl">RÉCORD</div></div>';
  c.appendChild(streak);

  // ── Momentum (vs hace 4 semanas) ────────────────────────────
  var mom = getMomentum();
  var volDelta = mom.pastVol > 0 ? Math.round((mom.curVol-mom.pastVol)/mom.pastVol*100) : 0;
  var liftDelta = mom.pastMax > 0 ? Math.round((mom.curMax-mom.pastMax)/mom.pastMax*100) : 0;
  var momCard = document.createElement("div"); momCard.className="momentum-card";
  momCard.innerHTML =
    '<div class="momentum-title">⚡ HOY VS SEMANA '+mom.pastWeek+'</div>'+
    '<div class="momentum-row"><span class="momentum-key">Volumen total</span><span class="momentum-val mono '+(volDelta>0?"up":volDelta<0?"down":"flat")+'">'+(volDelta>0?"+":"")+volDelta+'%</span></div>'+
    '<div class="momentum-row"><span class="momentum-key">Mejor levantamiento</span><span class="momentum-val mono '+(liftDelta>0?"up":liftDelta<0?"down":"flat")+'">'+(liftDelta>0?"+":"")+liftDelta+'%</span></div>';
  c.appendChild(momCard);

  // ── Heatmap volumen por grupo muscular ──────────────────────
  var heat = document.createElement("div"); heat.className="heat-card";
  heat.innerHTML = '<div class="heat-title">Distribución de volumen</div><div class="heat-sub">Semana '+state.week+' · todos los días</div>';
  var heatGrid = document.createElement("div"); heatGrid.className="heat-grid";
  var vols = getMuscleHeatmap(state.week);
  var maxVol = Math.max(1, Math.max.apply(null, Object.values(vols)));
  ["pecho","espalda","piernas","hombros","brazos"].forEach(function(g){
    var v = vols[g]||0;
    var pct = maxVol>0 ? (v/maxVol*100) : 0;
    var row = document.createElement("div"); row.className="heat-row";
    var color = GROUP_COLOR[g];
    row.innerHTML =
      '<div class="heat-mg">'+(GROUP_ICON[g]||"")+' '+g+'</div>'+
      '<div class="heat-bar"><div class="heat-fill" style="width:'+pct+'%;background:linear-gradient(90deg,'+color+'aa,'+color+')"></div></div>'+
      '<div class="heat-vol">'+(v?Math.round(v)+'kg':'—')+'</div>';
    heatGrid.appendChild(row);
  });
  heat.appendChild(heatGrid);
  c.appendChild(heat);

  // ── Achievements strip ──────────────────────────────────────
  var achTitle = document.createElement("div"); achTitle.className="sec-lbl";
  var unlocked = ACHIEVEMENTS.filter(function(a){return a.check(stats);}).length;
  achTitle.innerHTML = '<span>Logros</span><span class="count mono">'+unlocked+'/'+ACHIEVEMENTS.length+'</span>';
  c.appendChild(achTitle);
  var achStrip = document.createElement("div"); achStrip.className="ach-strip";
  ACHIEVEMENTS.forEach(function(ach){
    var unlocked = ach.check(stats);
    var card = document.createElement("div"); card.className="ach-card "+(unlocked?"unlocked":"locked");
    card.innerHTML = '<div class="ach-ico">'+ach.icon+'</div><div class="ach-name">'+ach.name+'</div><div class="ach-desc">'+ach.desc+'</div>';
    achStrip.appendChild(card);
  });
  c.appendChild(achStrip);

  // ── Photo card ──────────────────────────────────────────────
  var pc = document.createElement("div"); pc.className="photo-card";

  var photoInput = document.createElement("input"); photoInput.type="file"; photoInput.accept="image/*";
  photoInput.className="photo-upload-input";
  for(var wi2=Math.max(1,state.week-5); wi2<=state.week; wi2++){
    (function(wk){

        cv.getContext("2d").drawImage(img2,0,0,cv.width,cv.height);

        render();

  pc.appendChild(photoInput);

  // ── History filter ──────────────────────────────────────────

  var hf = document.createElement("div"); hf.className="h-filter";

    var b = document.createElement("button"); b.className=state.hFilter===p[0]?"on":"";
    b.textContent = p[1];
    b.onclick = function(){ state.hFilter=p[0]; render(); };

  // ── Per-exercise premium charts ─────────────────────────────
  var exs = PROGRAM[state.day]||[];
  exs.forEach(function(exDef){
    var ex = exDef.name;
    var hist = getH(state.day,ex);
    var data = [];
    for(var i=Math.max(1,state.week-state.hFilter+1); i<=state.week; i++){
      var w = getE(i,state.day,ex).mainWeight||null;
      data.push({week:i, weight:w});
    }
    var validData = data.filter(function(d){return d.weight && d.weight>0;});

    var hhead = document.createElement("div"); hhead.className="hcard-head";

      '<div class="hcard-group" style="color:'+gc+'">'+
      (GROUP_ICON[exDef.group]||"")+" "+(exDef.group||"").toUpperCase()+'</div>';

    var firstW = validData.length ? validData[0].weight : 0;
    var lastW  = validData.length ? validData[validData.length-1].weight : 0;
    var maxW   = validData.length ? Math.max.apply(null,validData.map(function(d){return d.weight;})) : 0;
    var deltaW = firstW>0 ? lastW-firstW : 0;
    var deltaPct = firstW>0 ? Math.round((lastW-firstW)/firstW*100) : 0;

    if(validData.length>1){
      var dEl = document.createElement("div");
      dEl.className="hcard-delta"+(deltaW<0?" neg":"");
      dEl.textContent=(deltaW>=0?"+":"")+deltaPct+"% vs S"+(validData[0].week);
      hhead.appendChild(hl); hhead.appendChild(dEl);
    } else {
      hhead.appendChild(hl);
    }
    hc.appendChild(hhead);

    if(validData.length >= 1){
      var ca = document.createElement("div"); ca.className="chart-area";
      ca.appendChild(buildPremiumChart(data, maxW, gc));
      hc.appendChild(ca);
      // Stats row
      var sr = document.createElement("div"); sr.className="hcard-stats";
      [
        {ico:"○", lbl:"INICIAL", val: firstW>0 ? firstW+" kg":"—", cls:""},
        {ico:"↑", lbl:"ACTUAL",  val: lastW>0  ? lastW+" kg":"—",  cls:"green"},
        {ico:"★", lbl:"RÉCORD",  val: maxW>0   ? maxW+" kg":"—",   cls:"gold"},
        {ico:"▲", lbl:"GANADO",  val: deltaW>0 ? "+"+deltaW+" kg": deltaW<0 ? deltaW+" kg":"—", cls: deltaW>0?"green":deltaW<0?"":""}
      ].forEach(function(s){
        var box=document.createElement("div"); box.className="hcs";
        box.innerHTML='<div class="hcs-ico" style="color:'+gc+'">'+s.ico+'</div>'+
          '<div class="hcs-lbl">'+s.lbl+'</div>'+
          '<div class="hcs-val '+s.cls+'">'+s.val+'</div>';
        sr.appendChild(box);
      });
      hc.appendChild(sr);
    } else {
      var em=document.createElement("div"); em.className="h-empty";
      em.textContent="Sin datos en este rango"; hc.appendChild(em);
    }
    c.appendChild(hc);
  });
}

/* ─── CHART PREMIUM — ejes, etiquetas en puntos, área degradada ─ */
function buildPremiumChart(data, maxW, lineColor){
  var VW=340, VH=130, padL=30, padR=12, padT=16, padB=22;
  var cW=VW-padL-padR, cH=VH-padT-padB;
  lineColor = lineColor||"#a855f7";

  var svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("class","chart-svg-p");
  svg.setAttribute("viewBox","0 0 "+VW+" "+VH);
  svg.setAttribute("preserveAspectRatio","xMidYMid meet");

  var uid = "cg"+Math.random().toString(36).slice(2,7);
  var defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
  var grad=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");
  grad.setAttribute("id",uid); grad.setAttribute("x1","0"); grad.setAttribute("y1","0");
  grad.setAttribute("x2","0"); grad.setAttribute("y2","1");
  var s1=document.createElementNS("http://www.w3.org/2000/svg","stop");
  s1.setAttribute("offset","0%"); s1.setAttribute("stop-color",lineColor); s1.setAttribute("stop-opacity","0.35");
  var s2=document.createElementNS("http://www.w3.org/2000/svg","stop");
  s2.setAttribute("offset","100%"); s2.setAttribute("stop-color",lineColor); s2.setAttribute("stop-opacity","0.02");
  grad.appendChild(s1); grad.appendChild(s2); defs.appendChild(grad); svg.appendChild(defs);

  var validPts=data.filter(function(d){return d.weight&&d.weight>0;});
  if(!validPts.length) return svg;
  var vals=validPts.map(function(d){return d.weight;});
  var vMin=Math.min.apply(null,vals), vMax=Math.max.apply(null,vals);
  var range=vMax-vMin||vMax*0.1||1;
  vMin=vMin-range*0.2; vMax=vMax+range*0.15; range=vMax-vMin;

  function px(i){ return padL + (i/(data.length>1?data.length-1:1))*cW; }
  function py(v){ return padT + (1-(v-vMin)/range)*cH; }

  // Horizontal grid lines (3)
  [0,0.5,1].forEach(function(f){
    var yv=vMin+f*range, gy=padT+(1-f)*cH;
    var gl=document.createElementNS("http://www.w3.org/2000/svg","line");
    gl.setAttribute("x1",padL); gl.setAttribute("x2",VW-padR);
    gl.setAttribute("y1",gy);   gl.setAttribute("y2",gy);
    gl.setAttribute("stroke","#262640"); gl.setAttribute("stroke-width","1");
    svg.appendChild(gl);
    // Y label
    var t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",padL-4); t.setAttribute("y",gy+3);
    t.setAttribute("text-anchor","end"); t.setAttribute("font-size","8");
    t.setAttribute("fill","#4a4a68"); t.setAttribute("font-family","monospace");
    t.textContent=Math.round(yv);
    svg.appendChild(t);
  });

  // Build coords only for valid points
  var pts=data.map(function(d,i){
    if(!d.weight||!d.weight>0) return null;
    return {x:px(i), y:py(d.weight), weight:d.weight, week:d.week};
  });
  var vps=pts.filter(function(p){return p!==null;});

  if(vps.length>1){
    // Area
    var aD="M"+vps[0].x+","+(padT+cH);
    vps.forEach(function(p){aD+=" L"+p.x+","+p.y;});
    aD+=" L"+vps[vps.length-1].x+","+(padT+cH)+" Z";
    var area=document.createElementNS("http://www.w3.org/2000/svg","path");
    area.setAttribute("d",aD); area.setAttribute("fill","url(#"+uid+")");
    svg.appendChild(area);
    // Line
    var lD="M"+vps[0].x+","+vps[0].y;
    vps.forEach(function(p,i){if(i>0) lD+=" L"+p.x+","+p.y;});
    var line=document.createElementNS("http://www.w3.org/2000/svg","path");
    line.setAttribute("d",lD); line.setAttribute("stroke",lineColor);
    line.setAttribute("stroke-width","2"); line.setAttribute("fill","none");
    line.setAttribute("stroke-linecap","round"); line.setAttribute("stroke-linejoin","round");
    svg.appendChild(line);
  }

  // Points + value labels
  vps.forEach(function(p){
    var isPR = p.weight===maxW && maxW>0;
    // Dot
    var c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",p.x); c.setAttribute("cy",p.y);
    c.setAttribute("r", isPR?"5":"3.5");
    c.setAttribute("fill", isPR?"#fbbf24":lineColor);
    c.setAttribute("stroke","#0b0b12"); c.setAttribute("stroke-width","1.5");
    if(isPR){
      var gl2=document.createElementNS("http://www.w3.org/2000/svg","circle");
      gl2.setAttribute("cx",p.x); gl2.setAttribute("cy",p.y);
      gl2.setAttribute("r","9"); gl2.setAttribute("fill","#fbbf24"); gl2.setAttribute("opacity","0.2");
      svg.appendChild(gl2);
    }
    svg.appendChild(c);
    // Value label above point
    var t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",p.x); t.setAttribute("y",p.y-8);
    t.setAttribute("text-anchor","middle"); t.setAttribute("font-size","8.5");
    t.setAttribute("fill", isPR?"#fbbf24":lineColor);
    t.setAttribute("font-family","monospace"); t.setAttribute("font-weight","bold");
    t.textContent=p.weight;
    svg.appendChild(t);
    // Week label below X axis
    var tw=document.createElementNS("http://www.w3.org/2000/svg","text");
    tw.setAttribute("x",p.x); tw.setAttribute("y",VH-4);
    tw.setAttribute("text-anchor","middle"); tw.setAttribute("font-size","7.5");
    tw.setAttribute("fill","#4a4a68"); tw.setAttribute("font-family","monospace");
    tw.textContent="S"+p.week;
    svg.appendChild(tw);
  });

  return svg;
}

/* ─── EXPORT / IMPORT ────────────────────────────────────────── */
function exportData(){
  var data = JSON.stringify(db, null, 2);
  var blob = new Blob([data], {type:"application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a"); a.href=url;
  var date = new Date().toISOString().slice(0,10);
  a.download = "gymtracker_backup_"+date+".json";
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
  toast("Backup descargado","💾");
}
